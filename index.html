<!DOCTYPE html>
<html>

<head>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-title" content="Classement Jeux">
  <title>Classement Jeux</title>
  <style>
    body {
      max-width: 600px;
      margin: auto;
      padding: 10px;
      font-size: 16px;
    }
  
    button {
     padding: 10px;
      font-size: 16px;
      margin-top: 5px;
      width: 100%;
      border-radius: 8px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      font-size: 16px;
      border-radius: 6px;
    }

    select {
      padding: 8px;
      margin-top: 5px;
      font-size: 16px;
      border-radius: 6px;
    }

    .player-item {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      width: 100%;
      padding: 8px 0;
      box-sizing: border-box;
    }

    .player-item input[type="checkbox"] {
      margin: 0;
      flex: 0 0 24px;
      width: 20px;
      height: 20px;
      accent-color: #333;
    }

    .player-item span {
      flex: 0 1 auto;
      text-align: left;
      line-height: 1.2;
    }

    .player-item input[type="checkbox"] {
      transform: scale(1.2);
    }

    .teamSelect {
      position: relative;
      z-index: 10;
    }

    .player-item select.teamSelect {
      flex: 0 0 auto;
    }

    .section {
     margin-top: 20px;
    }

    .toggle-btn {
     background:#ddd;
      padding:10px;
      border:none;
      cursor:pointer;
      width:100%;
      text-align:left;
      font-size:16px;
    }

    .hidden {
      display:none;
    }

    .subsection {
      margin-left: 10px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>Nouvelle partie</h1>

<!-- ============================
     CHOIX DU JEU
============================ -->
<label>Jeu :</label>
<select id="jeu" onchange="onJeuChange()"></select>

<!-- MODE (visible seulement si mixte) -->
<div id="modeContainer" style="margin-top:10px; display:none;">
  <label>Mode :</label>
  <select id="mode" onchange="updateClassementInputs()">
    <option value="competitif">Compétitif</option>
    <option value="coop">Coop</option>
  </select>
</div>

<!-- MODE ÉQUIPE -->
<div id="teamModeContainer" style="margin-top:10px; display:none;">
  <label>Jouer en équipe :</label>
  <select id="teamModeSelect" onchange="updateClassementInputs()">
    <option value="non">Non</option>
    <option value="oui">Oui</option>
  </select>
</div>

<div id="teamCountContainer" style="margin-top:10px; display:none;">
  <label>Nombre d’équipes :</label>
  <select id="teamCount" onchange="updateClassementInputs()">
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
  </select>
</div>

<!-- DIFFICULTÉ COOP -->
<div id="coopDifficultyContainer" style="display:none; margin-top:10px;">
  <label>Difficulté :</label>
  <select id="coopDifficulty">
    <option value="0.8">Facile</option>
    <option value="1.0">Moyen</option>
    <option value="1.2">Difficile</option>
  </select>
</div>

<!-- JOUEURS -->
<h3>Joueurs</h3>
<div id="joueursList"></div>

<!-- INPUTS DE CLASSEMENT -->
<h3>Classement de la partie</h3>
<div id="classementInputs"></div>

<!-- BOUTONS -->
<br>
<button onclick="ajouterPartie()">Valider</button>
<button onclick="exporterDonnees()">Exporter</button>
<input type="file" id="importFile" onchange="importerDonnees()" style="display:none;">
<button onclick="document.getElementById('importFile').click()">Importer</button>
<button onclick="reset()">Reset</button>

<!-- ============================
     CLASSEMENT (repliable)
============================ -->
<div class="section">
  <button class="toggle-btn" onclick="toggle('blocClassement')">▸ Classement actuel</button>
  <div id="blocClassement" class="hidden">
    <div id="classement" class="subsection"></div>
  </div>
</div>

<!-- ============================
     HISTORIQUE (repliable)
============================ -->
<div class="section">
  <button class="toggle-btn" onclick="toggle('blocHistorique')">▸ Historique</button>
  <div id="blocHistorique" class="hidden">
    <div id="historique" class="subsection"></div>
  </div>
</div>

<!-- ============================
     GESTION JOUEURS (repliable)
============================ -->
<div class="section">
  <button class="toggle-btn" onclick="toggle('blocJoueurs')">▸ Gestion des joueurs</button>
  <div id="blocJoueurs" class="hidden">

    <div id="gestionJoueurs" class="subsection"></div>

    <button class="toggle-btn" onclick="toggle('blocAddJoueur')">▸ Ajouter joueur</button>
    <div id="blocAddJoueur" class="hidden subsection">
      <input id="newPlayer" placeholder="Nom">
      <button onclick="ajouterJoueur()">Ajouter</button>
    </div>

  </div>
</div>

<!-- ============================
     GESTION JEUX (repliable)
============================ -->
<div class="section">
  <button class="toggle-btn" onclick="toggle('blocJeux')">▸ Gestion des jeux</button>
  <div id="blocJeux" class="hidden">

    <div id="gestionJeux" class="subsection"></div>

    <button class="toggle-btn" onclick="toggle('blocAddJeu')">▸ Ajouter jeu</button>
    <div id="blocAddJeu" class="hidden subsection">
      <input id="newGameName" placeholder="Nom"><br>
      <input id="newGameComplexity" placeholder="Complexité"><br>
      <input id="newGameDuration" placeholder="Durée"><br>
      
      <label>Mode :</label>
      <select id="newGameMode" onchange="onModeChangeNewGame()">
        <option value="competitif">Compétitif</option>
        <option value="coop">Coop</option>
        <option value="mixte">Mixte</option>
      </select><br><br>
      
      <div id="victoryTypeContainer">
        <label>Type de victoire (compétitif) :</label>
        <select id="newGameVictoryType">
          <option value="classement">Classement</option>
          <option value="binaire">Victoire / Défaite</option>
        </select><br><br>
      </div>

  <label>Durée variable :</label>
  <select id="newGameVariableDuration">
    <option value="non">Non</option>
    <option value="oui">Oui</option>
  </select><br><br>

  <label>Mode équipe :</label>
  <select id="newGameTeamMode">
    <option value="non">Jamais en équipe</option>
    <option value="oui">Toujours en équipe</option>
    <option value="variable">Variable</option>
  </select><br><br>

  <button onclick="ajouterJeu()">Ajouter jeu</button>
</div>

  </div>
</div>

<!-- ============================================================
     SCRIPT FINAL OPTIMISÉ
============================================================ -->
<script>

const REGRESSION_RATE = 0.02;  // <--- tu changes ici si besoin

let jeux = JSON.parse(localStorage.getItem("jeux")) || {};
let joueurs = JSON.parse(localStorage.getItem("joueurs")) || {};
let historique = JSON.parse(localStorage.getItem("historique")) || [];
let coopGainSoiree = {};

// 🔥 Auto backup toutes les 30 secondes
setInterval(() => {
  const data = { joueurs, jeux, historique };
  localStorage.setItem("backup_auto", JSON.stringify(data));
}, 30000);

function toggle(id) {
  let el = document.getElementById(id);
  el.classList.toggle("hidden");
}

function onModeChangeNewGame() {
  let mode = document.getElementById("newGameMode").value;
  let victoryDiv = document.getElementById("victoryTypeContainer");

  if (mode === "coop") {
    victoryDiv.style.display = "none";
  } else {
    victoryDiv.style.display = "block";
  }
}

/* ============================
   AFFICHAGE
============================ */
function afficherJeux() {
  let select = document.getElementById("jeu");
  select.innerHTML = "";
  Object.keys(jeux).forEach(j => {
    let o = document.createElement("option");
    o.value = j;
    o.textContent = j;
    select.appendChild(o);
  });

  if (Object.keys(jeux).length > 0) {
    onJeuChange();
  }
}

function afficherJoueurs() {
  let html = "";

  Object.keys(joueurs).forEach(j => {
    html += `
    <div class="player-item">
      <input type="checkbox" value="${j}" onchange="updateClassementInputs()">
      <span>${j}</span>
      <select id="team_${j}" class="teamSelect" style="display:none;" onchange="updateClassementInputs()">
        </select>
        </div>
        `;
  });

  document.getElementById("joueursList").innerHTML = html;
}

function afficherClassement() {
  let sorted = Object.entries(joueurs).sort((a,b)=>b[1].score - a[1].score);
  let html = "<ul>";
  sorted.forEach(([nom,data]) => html += `<li>${nom} : ${data.score.toFixed(0)}</li>`);
  html += "</ul>";
  document.getElementById("classement").innerHTML = html;
}

function afficherHistorique() {
  let html = "<ul>";
  historique.slice().reverse().forEach(p => {
    html += `<li>${p.date} - ${p.jeu} (${p.joueurs.join(", ")})</li>`;
  });
  html += "</ul>";
  document.getElementById("historique").innerHTML = html;
}

function afficherGestionJoueurs() {
  let html = "<ul>";
  Object.entries(joueurs).forEach(([nom,data])=>{
    html += `<li><b>${nom}</b> (${data.score.toFixed(0)})
      <button onclick="modifierJoueur('${nom}')">Modifier</button>
      <button onclick="supprimerJoueur('${nom}')">Supprimer</button>
    </li>`;
  });
  html += "</ul>";
  document.getElementById("gestionJoueurs").innerHTML = html;
}

function afficherGestionJeux() {
  let html = "<ul>";
  Object.entries(jeux).forEach(([nom,data])=>{
    html += `<li><b>${nom}</b> (C:${data.complexite}, D:${data.duree}, M:${data.mode}, Eq:${data.modeEquipe || "non"})
      <button onclick="modifierJeu('${nom}')">Modifier</button>
      <button onclick="supprimerJeu('${nom}')">Supprimer</button>
      </li>`;
  });
  html += "</ul>";
  document.getElementById("gestionJeux").innerHTML = html;
}

/* ============================
   AJOUT / MODIF
============================ */
function ajouterJeu() {
  let nom = newGameName.value.trim();
  if (!nom) return;

  let mode = newGameMode.value;


  // Coop → type de victoire toujours binaire
  let victoireType = (mode === "coop")
    ? "binaire"
    : newGameVictoryType.value;

  jeux[nom] = {
    complexite: parseFloat(newGameComplexity.value),
    duree: parseFloat(newGameDuration.value),
    mode: mode,
    victoire: victoireType,            // type de victoire compétitif
    variable: newGameVariableDuration.value, // durée variable oui/non
    modeEquipe: document.getElementById("newGameTeamMode").value
  };

  localStorage.setItem("jeux", JSON.stringify(jeux));

  afficherJeux();
  afficherGestionJeux();

  // Reset des champs
  newGameName.value = "";
  newGameComplexity.value = "";
  newGameDuration.value = "";
  newGameMode.value = "competitif";
  newGameVictoryType.value = "classement";
  newGameVariableDuration.value = "non";

  onModeChangeNewGame(); // réinitialise l'affichage du type de victoire
}

function ajouterJoueur() {
  let nom = newPlayer.value;
  if (!nom) return;
  joueurs[nom] = { score:500, debut:null };
  localStorage.setItem("joueurs", JSON.stringify(joueurs));
  afficherJoueurs();
  afficherClassement();
  afficherGestionJoueurs();
}

function supprimerJoueur(nom) {
  delete joueurs[nom];
  localStorage.setItem("joueurs", JSON.stringify(joueurs));
  afficherJoueurs(); afficherClassement(); afficherGestionJoueurs();
}

function modifierJoueur(nom) {
  let newName = prompt("Nom :", nom);
  if (!newName) return;
  let newScore = parseFloat(prompt("Score :", joueurs[nom].score));
  let ancien = joueurs[nom];

  delete joueurs[nom];

  joueurs[newName] = {
    score: newScore,
    debut: ancien.debut || null
  };
  localStorage.setItem("joueurs", JSON.stringify(joueurs));
  afficherJoueurs(); afficherClassement(); afficherGestionJoueurs();
}

function supprimerJeu(nom) {
  delete jeux[nom];
  localStorage.setItem("jeux", JSON.stringify(jeux));
  afficherJeux(); afficherGestionJeux();
}

function modifierJeu(nom) {
  let d = jeux[nom];
  let newName = prompt("Nom :", nom);
  if (!newName) return;
  let c = parseFloat(prompt("Complexité :", d.complexite));
  let du = parseFloat(prompt("Durée :", d.duree));
  let m = prompt("Mode (competitif/coop/mixte) :", d.mode);
  delete jeux[nom];
  jeux[newName] = {
    complexite: c,
    duree: du,
    mode: m,
    victoire: d.victoire || "classement",
    variable: d.variable || "non",
    modeEquipe: prompt("Mode équipe (oui/non/variable) :", d.modeEquipe || "non")
  };
  localStorage.setItem("jeux", JSON.stringify(jeux));
  afficherJeux(); afficherGestionJeux();
}

/* ============================
   MODE MIXTE + INPUTS
============================ */
function onJeuChange() {
  let jeu = document.getElementById("jeu").value;
  let data = jeux[jeu];

  // Si aucun jeu ou jeu introuvable, on ne fait rien
  if (!data) {
    document.getElementById("modeContainer").style.display = "none";
    document.getElementById("coopDifficultyContainer").style.display = "none";
    document.getElementById("classementInputs").innerHTML = "";
    return;
  }

  let teamModeContainer = document.getElementById("teamModeContainer");
  let teamCountContainer = document.getElementById("teamCountContainer");
  
  // Gestion du mode équipe selon le jeu
  if (data.modeEquipe === "oui") {
    teamModeContainer.style.display = "none";
    teamCountContainer.style.display = "block";
    document.getElementById("teamModeSelect").value = "oui";
  } else if (data.modeEquipe === "non") {
    teamModeContainer.style.display = "none";
    teamCountContainer.style.display = "none";
    document.getElementById("teamModeSelect").value = "non";
  } else { // "variable"
  teamModeContainer.style.display = "block";
  teamCountContainer.style.display = "none"; // 
  }


  let modeContainer = document.getElementById("modeContainer");
  let modeSelect = document.getElementById("mode");

  if (data.mode === "mixte") {
    modeContainer.style.display = "block";
  } else {
    modeContainer.style.display = "none";
    modeSelect.value = data.mode;
  }

  updateClassementInputs();
}

function updateClassementInputs() {

  let selected = Array.from(document.querySelectorAll('#joueursList input:checked')).map(el=>el.value);

  let jeu = document.getElementById("jeu").value;
  let data = jeux[jeu];

  // Si aucun jeu sélectionné
  if (!data) {
    document.getElementById("coopDifficultyContainer").style.display = "none";
    document.getElementById("classementInputs").innerHTML = "";
    return;
  }

  // Déterminer si on joue en équipe
  let teamMode = (data.modeEquipe === "variable")
  ? document.getElementById("teamModeSelect").value
  : data.modeEquipe;
  
  let teamCount = parseInt(document.getElementById("teamCount").value) || 2;
  
  // Afficher / remplir les selects d’équipe
  
  document.querySelectorAll(".teamSelect").forEach(sel => {
    sel.style.display = (teamMode === "oui") ? "inline-block" : "none";
    sel.innerHTML = "";
    for (let i = 1; i <= teamCount; i++) {
      sel.innerHTML += `<option value="${i}">${i}</option>`;
    }
  });

  // Si on joue en équipe, on génère un classement par équipe
  if (teamMode === "oui") {
    let html = "<label>Classement des équipes :</label><br>";
    for (let i = 1; i <= teamCount; i++) {
      html += `Équipe ${i} : <select id="teamPos_${i}">${genererOptions(teamCount)}</select><br>`;
    }
    document.getElementById("classementInputs").innerHTML = html;
    return;
  }

  // Déterminer le mode réel
  let modeReel = (data.mode === "mixte")
    ? document.getElementById("mode").value
    : data.mode;

  // Déterminer le type de victoire
  let type;

  if (modeReel === "coop") {
    type = "binaire"; // toujours
  }
  else if (modeReel === "competitif") {
    type = data.victoire; // lu dans le jeu
  }
  else if (modeReel === "mixte") {
    let selectedMode = document.getElementById("mode").value;
    type = (selectedMode === "coop") ? "binaire" : data.victoire;
  }

  // Affichage difficulté coop
  let coopDiv = document.getElementById("coopDifficultyContainer");
  coopDiv.style.display = (modeReel === "coop") ? "block" : "none";

  // Génération des inputs
  let html = "";

  if (modeReel === "coop") {

    html = `
      <label>Résultat :</label>
      <select id="resultat_coop">
        <option value="1">Victoire</option>
        <option value="0">Défaite</option>
      </select>
    `;

  } else if (type === "binaire") {

    html = `<label>Gagnant :</label><br>`;
    selected.forEach(j => {
      html += `<label><input type="radio" name="gagnant" value="${j}">${j}</label><br>`;
    });

  } else if (type === "classement") {

    selected.forEach(j => {
      html += `${j} : <select id="pos_${j}">${genererOptions(selected.length)}</select><br>`;
    });

  }

  document.getElementById("classementInputs").innerHTML = html;
}

function genererOptions(n) {
  let o = "";
  for (let i=1;i<=n;i++) o += `<option value="${i}">${i}</option>`;
  return o;
}

/* ============================
   AJOUT PARTIE
============================ */
function ajouterPartie() {

  let selected = Array.from(document.querySelectorAll('#joueursList input:checked')).map(el=>el.value);
  if (selected.length === 0) return;

  let jeu = document.getElementById("jeu").value;
  let data = jeux[jeu];
  if (!data) return;

  // Déterminer le mode réel
  let modeReel = (data.mode === "mixte")
    ? document.getElementById("mode").value
    : data.mode;

  // Déterminer le type de victoire
  let type;
  if (modeReel === "coop") {
    type = "binaire"; // toujours
  } else if (modeReel === "competitif") {
    type = data.victoire; // type du jeu
  } else if (modeReel === "mixte") {
    let selectedMode = document.getElementById("mode").value;
    type = (selectedMode === "coop") ? "binaire" : data.victoire;
  }

  let parsed = [];

  // Déterminer si on joue en équipe
  let teamMode = (data.modeEquipe === "variable")
  ? document.getElementById("teamModeSelect").value
  : data.modeEquipe;
  
  let teamCount = parseInt(document.getElementById("teamCount").value) || 2;
  
  if (teamMode === "oui") {
    // Construire les équipes
    let equipes = {};
    selected.forEach(j => {
    let t = parseInt(document.getElementById("team_" + j).value);
    if (!equipes[t]) equipes[t] = [];
    equipes[t].push(j);
  });

  // Récupérer les positions d’équipe
  let positions = {};
  for (let i = 1; i <= teamCount; i++) {
    positions[i] = parseInt(document.getElementById("teamPos_" + i).value);
  }

  // Construire parsed : chaque joueur hérite de la position de son équipe
  parsed = [];
  Object.entries(equipes).forEach(([team, joueursTeam]) => {
    joueursTeam.forEach(j => {
      parsed.push({
        nom: j,
        equipe: parseInt(team),
        position: positions[team]
      });
    });
  });
  }

  if (teamMode !== "oui") {

    // Coop → victoire/défaite
    if (modeReel === "coop") {
      let r = parseInt(document.getElementById("resultat_coop").value);
      selected.forEach(j => parsed.push({ nom:j, scoreFixe:r }));
    }

    // Binaire → gagnant/perdants
    else if (type === "binaire") {
     let g = document.querySelector('input[name="gagnant"]:checked')?.value;
      if (type === "binaire" && !g) {
       alert("Choisis un gagnant");
        return;
      }
      selected.forEach(j => parsed.push({ nom:j, scoreFixe:(j===g?1:0) }));
    }

    // Classement → positions
    else if (type === "classement") {
     selected.forEach(j=>{
        parsed.push({ nom:j, position:parseInt(document.getElementById("pos_"+j).value) });
      });
    }
  }

  // Enregistrer la date de début pour les nouveaux joueurs
  let today = new Date().toISOString().split("T")[0];
  selected.forEach(j => {
    if (!joueurs[j].debut) {
      joueurs[j].debut = today;
    }
  });

  // Enregistrer la partie
  historique.push({
    id: Date.now(),
    date: new Date().toISOString().split("T")[0],
    joueurs: parsed.map(p => p.nom),
    jeu: jeu,
    mode: modeReel,
    resultat: parsed
  });
  localStorage.setItem("historique", JSON.stringify(historique));

  // Régression + Elo
  regressionSessions();
  calculElo(parsed, modeReel, data);

  afficherClassement();
  afficherHistorique();
}

/* ============================
   RÉGRESSION SESSIONS
============================ */
function regressionSessions() {

  let sessions = {};

  // 🔹 Construire les sessions par joueur
  historique.forEach(p => {

    let datePartie = new Date(p.date).getTime();

    p.joueurs.forEach(j => {

      if (!joueurs[j] || !joueurs[j].debut) return;

      let debut = new Date(joueurs[j].debut).getTime();

      if (datePartie >= debut) {

        if (!sessions[j]) sessions[j] = new Set();

        sessions[j].add(datePartie);
      }
    });
  });

  // 🔹 Analyse + régression
  Object.keys(joueurs).forEach(joueur => {

    let debut = joueurs[joueur].debut;
    if (!debut) return;

    let debutDate = new Date(debut).getTime();

    let counts = Object.keys(joueurs)
      .filter(j => sessions[j])
      .map(j => {
        return [...sessions[j]].filter(t => t >= debutDate).length;
      })
      .filter(n => n > 0);

    if (counts.length === 0) return;

    let moyenne = counts.reduce((a, b) => a + b, 0) / counts.length;

    let nb = sessions[joueur]
      ? [...sessions[joueur]].filter(t => t >= debutDate).length
      : 0;

    let ratio = nb / moyenne;

    // 🔹 Régression vers 500
    if (ratio < 0.5) {
      joueurs[joueur].score += (500 - joueurs[joueur].score) * REGRESSION_RATE;
    }

    if (ratio > 1.5 && joueurs[joueur].score < 500) {
      joueurs[joueur].score += (500 - joueurs[joueur].score) * REGRESSION_RATE;
    }
  });

  localStorage.setItem("joueurs", JSON.stringify(joueurs));
}

/* ============================
   CALCUL ELO
============================ */
function calculElo(partie, modeReel, data) {

  let K = 40;

  // Facteur de difficulté coop
  let difficultyFactor = (modeReel === "coop")
    ? parseFloat(document.getElementById("coopDifficulty").value)
    : 1;

  let N = partie.length;

  // Vérifier si on est en mode équipe (présence de p.equipe)
  let isTeam = partie.some(p => p.equipe !== undefined);
  
  if (isTeam) {

  // Construire les équipes
  let equipes = {};
  partie.forEach(p => {
    if (!equipes[p.equipe]) equipes[p.equipe] = [];
    equipes[p.equipe].push(p.nom);
  });

  // Calcul rating moyen par équipe
  let ratingEquipe = {};
  Object.entries(equipes).forEach(([team, joueursTeam]) => {
    let sum = joueursTeam.reduce((a, j) => a + joueurs[j].score, 0);
    ratingEquipe[team] = sum / joueursTeam.length;
  });

  // Expected par équipe
  let expectedEquipe = {};
  let teams = Object.keys(equipes);

  teams.forEach(t1 => {
    let exp = 0;
    teams.forEach(t2 => {
      if (t1 !== t2) {
        exp += 1 / (1 + Math.pow(10, (ratingEquipe[t2] - ratingEquipe[t1]) / 400));
      }
    });
    if (teams.length > 1) {
      exp /= (teams.length - 1);
    }
    expectedEquipe[t1] = exp;
  });

  // Score réel par équipe (en fonction de la position d’équipe)
  let scoreEquipe = {};
  teams.forEach(t => {
    let pos = partie.find(p => p.equipe == t).position;
    scoreEquipe[t] = (teams.length - pos) / (teams.length - 1);
  });

  // Multiplicateur M (comme avant)
  let C = 1 + (data.complexite - 2.5) * 0.3;
  let J = 1 + (N - 2) * 0.1;
  let dureeEffective = data.duree;
  if (data.variable === "oui") {
    dureeEffective = data.duree * N;
  }
  let D = (dureeEffective < 30)
    ? 0.9
    : (dureeEffective <= 90 ? 1.0 : 1.15);
  let M = Math.max(0.6, Math.min(2.0, C * J * D));

  // Appliquer variation à chaque joueur
  partie.forEach(p => {
    let delta = K * M * difficultyFactor * (scoreEquipe[p.equipe] - expectedEquipe[p.equipe]);
    delta = Math.max(-50, Math.min(50, delta));
    joueurs[p.nom].score += delta;
  });

  localStorage.setItem("joueurs", JSON.stringify(joueurs));
  return; // on sort, on ne fait pas le reste
  }

  // Complexité du jeu
  let C = 1 + (data.complexite - 2.5) * 0.3;

  // Nombre de joueurs
  let J = 1 + (N - 2) * 0.1;

  // Durée effective (variable ou non)
  let dureeEffective = data.duree;

  if (data.variable === "oui") {
    dureeEffective = data.duree * N;
  }

  // Catégorie de durée
  let D = (dureeEffective < 30)
    ? 0.9
    : (dureeEffective <= 90 ? 1.0 : 1.15);

  // Multiplicateur final
  let M = Math.max(0.6, Math.min(2.0, C * J * D));

  // Gestion du plafond coop par soirée
  let dateSoiree = new Date().toDateString();
  if (!coopGainSoiree[dateSoiree]) coopGainSoiree[dateSoiree] = {};

  if (!data) return;

  partie.forEach(j => {

    // Score réel selon type de victoire
    let score = (j.scoreFixe !== undefined)
      ? j.scoreFixe
      : (partie.length === 1
        ? 1
        : (partie.length - j.position) / (partie.length - 1));

    // Score attendu
    let expected = 0;
    partie.forEach(other => {
      if (other.nom !== j.nom) {
        expected += 1 / (1 + Math.pow(10,
          (joueurs[other.nom].score - joueurs[j.nom].score) / 400
        ));
      }
    });
    if (partie.length > 1) {
      expected /= (partie.length - 1);
    }

    // Variation Elo
    let delta = K * M * difficultyFactor * (score - expected);

    // Gestion spéciale coop
    if (modeReel === "coop") {

      if (!coopGainSoiree[dateSoiree][j.nom]) {
        coopGainSoiree[dateSoiree][j.nom] = 0;
      }

      let potentiel = delta * 0.5;
      let restant = 20 - coopGainSoiree[dateSoiree][j.nom];
      let applique = Math.min(restant, Math.max(-20, potentiel));

      coopGainSoiree[dateSoiree][j.nom] += applique;
      delta = applique;
    }

    // Clamp final
    delta = Math.max(-50, Math.min(50, delta));

    // Application du score
    joueurs[j.nom].score += delta;
  });

  localStorage.setItem("joueurs", JSON.stringify(joueurs));
}

/* ============================
   IMPORT / EXPORT
============================ */
function exporterDonnees() {
  const data = { joueurs, jeux, historique };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "classement_backup.json";
  a.click();

  URL.revokeObjectURL(url);
}

function importerDonnees() {
  const fileInput = document.getElementById("importFile");
  const file = fileInput.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);

      if (data.joueurs && data.jeux && data.historique) {

        joueurs = data.joueurs;
        jeux = data.jeux;
        historique = data.historique;

        localStorage.setItem("joueurs", JSON.stringify(joueurs));
        localStorage.setItem("jeux", JSON.stringify(jeux));
        localStorage.setItem("historique", JSON.stringify(historique));

        afficherClassement();
        afficherJeux();
        afficherJoueurs();
        afficherHistorique();
        afficherGestionJeux();
        afficherGestionJoueurs();

        alert("Import réussi !");
      } else {
        alert("Fichier invalide.");
      }
    } catch (err) {
      alert("Erreur lors de l'import.");
    }
  };

  reader.readAsText(file);
}

function reset() {
  localStorage.removeItem("joueurs");
  localStorage.removeItem("jeux");
  localStorage.removeItem("historique");
  location.reload();
}

window.onload = function() {
  // 🔥 Récupération backup auto si dispo
  let backup = localStorage.getItem("backup_auto");
  if (backup) {
    try {
      let data = JSON.parse(backup);
      if (data.joueurs && data.jeux && data.historique) {
        joueurs = data.joueurs;
        jeux = data.jeux;
        historique = data.historique;

        localStorage.setItem("joueurs", JSON.stringify(joueurs));
        localStorage.setItem("jeux", JSON.stringify(jeux));
        localStorage.setItem("historique", JSON.stringify(historique));
      }
    } catch(e) {}
  }
  afficherJeux();
  afficherJoueurs();
  onModeChangeNewGame();
  afficherClassement();
  afficherHistorique();
  afficherGestionJeux();
  afficherGestionJoueurs();
};
